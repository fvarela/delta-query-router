# Azure AKS overrides — merged on top of values.yaml
# Usage: helm install delta ./delta-router -f values-azure.yaml
routingService:
  image:
    repository: <acr-name>.azurecr.io/delta-router/routing-service
    pullPolicy: Always
  modelStorage:
    storageClass: managed-csi
webUi:
  image:
    repository: <acr-name>.azurecr.io/delta-router/web-ui
    pullPolicy: Always
duckdbWorker:
  image:
    repository: <acr-name>.azurecr.io/delta-router/duckdb-worker
    pullPolicy: Always
postgresql:
  image:
    repository: postgres
    pullPolicy: IfNotPresent
  storage:
    storageClass: managed-csi
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
  host: ""
secrets:
  adminCredentials:
    create: true
    username: admin
    password: CHANGE-ME-IN-PRODUCTION
  postgresqlCredentials:
    create: true
    user: delta
    password: CHANGE-ME-IN-PRODUCTION
    database: deltarouter