{{- if .Values.secrets.postgresqlCredentials.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "delta-router.fullname" . }}-postgresql
  labels:
    {{- include "delta-router.labels" . | nindent 4 }}
    app: postgresql
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.secrets.postgresqlCredentials.user }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresqlCredentials.password }}
  POSTGRES_DB: {{ .Values.secrets.postgresqlCredentials.database }}
{{- end }}