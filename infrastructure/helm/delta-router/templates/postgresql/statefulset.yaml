apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "delta-router.postgresql.fullname" . }}
  labels:
    {{- include "delta-router.labels" . | nindent 4 }}
    app: postgresql
spec:
  serviceName: {{ include "delta-router.postgresql.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        {{- include "delta-router.labels" . | nindent 8 }}
        app: postgresql
    spec:
      containers:
      - name: postgresql
        image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
        imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.postgresql.port }}
          name: postgres
        envFrom:
        - secretRef:
            name: {{ include "delta-router.postgresqlCredentials.secretName" . }}
        resources:
          {{- toYaml .Values.postgresql.resources | nindent 10 }}
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", {{ .Values.secrets.postgresqlCredentials.user | quote }}]
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", {{ .Values.secrets.postgresqlCredentials.user | quote }}]
          initialDelaySeconds: 15
          periodSeconds: 10
        volumeMounts:
        - name: postgresql-data
          mountPath: /var/lib/postgresql/data
          subPath: pgdata
  volumeClaimTemplates:
  - metadata:
      name: postgresql-data
    spec:
      accessModes: ["ReadWriteOnce"]
      {{- if .Values.postgresql.storage.storageClass }}
      storageClassName: {{ .Values.postgresql.storage.storageClass }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.postgresql.storage.size }}