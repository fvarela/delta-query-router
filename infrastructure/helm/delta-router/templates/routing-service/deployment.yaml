apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "delta-router.routingService.fullname" . }}
  labels:
    {{- include "delta-router.labels" . | nindent 4 }}
    app: routing-service
spec:
  replicas: {{ .Values.routingService.replicas }}
  selector:
    matchLabels:
      app: routing-service
  template:
    metadata:
      labels:
        {{- include "delta-router.labels" . | nindent 8 }}
        app: routing-service
    spec:
      serviceAccountName: {{ include "delta-router.routingService.fullname" . }}
      containers:
      - name: routing-service
        image: "{{ .Values.routingService.image.repository }}:{{ .Values.routingService.image.tag }}"
        imagePullPolicy: {{ .Values.routingService.image.pullPolicy }}
        envFrom:
        - configMapRef:
            name: {{ include "delta-router.routingService.fullname" . }}-config
        - secretRef:
            name: {{ include "delta-router.postgresqlCredentials.secretName" . }}
        - secretRef:
            name: {{ include "delta-router.adminCredentials.secretName" . }}
        - secretRef:
            name: databricks-credentials
            optional: true
        env:
        - name: MODEL_DIR
          value: /models/
        ports:
        - containerPort: {{ .Values.routingService.port }}
          name: http
        resources:
          {{- toYaml .Values.routingService.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.routingService.port }}
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.routingService.port }}
          initialDelaySeconds: 15
          periodSeconds: 20
        volumeMounts:
        - name: model-storage
          mountPath: /models
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: {{ include "delta-router.routingService.fullname" . }}-model-storage