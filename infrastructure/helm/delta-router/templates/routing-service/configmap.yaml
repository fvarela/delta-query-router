apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "delta-router.routingService.fullname" . }}-config
  labels:
    {{- include "delta-router.labels" . | nindent 4 }}
    app: routing-service
data:
  POSTGRES_HOST: {{ include "delta-router.postgresql.fullname" . }}
  POSTGRES_PORT: {{ .Values.postgresql.port | quote }}
  POSTGRES_DB: {{ .Values.secrets.postgresqlCredentials.database }}