apiVersion: apps/v1
kind: Deployment
metadata:
  name: duckdb-worker-large
  labels:
    app: duckdb-worker-large
    duckdb-tier: large
spec:
  replicas: 0
  selector:
    matchLabels:
      app: duckdb-worker-large
  template:
    metadata:
      labels:
        app: duckdb-worker-large
        duckdb-tier: large
    spec:
      containers:
      - name: duckdb-worker
        image: duckdb-worker:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8002
          name: http
        resources:
          requests:
            cpu: 1000m
            memory: 4Gi
          limits:
            cpu: 4000m
            memory: 16Gi
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 10
          failureThreshold: 5
