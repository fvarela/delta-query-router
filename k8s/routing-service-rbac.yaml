apiVersion: v1
kind: ServiceAccount
metadata:
  name: routing-service
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: routing-service-secret-manager
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: routing-service-secret-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: routing-service-secret-manager
subjects:
  - kind: ServiceAccount
    name: routing-service
    namespace: default