apiVersion: apps/v1
kind: Deployment
metadata:
  name: duckdb-worker-small
  labels:
    app: duckdb-worker-small
    duckdb-tier: small
spec:
  replicas: 1
  selector:
    matchLabels:
      app: duckdb-worker-small
  template:
    metadata:
      labels:
        app: duckdb-worker-small
        duckdb-tier: small
    spec:
      containers:
      - name: duckdb-worker
        image: duckdb-worker:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8002
          name: http
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 10
          failureThreshold: 5
