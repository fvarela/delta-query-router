apiVersion: apps/v1
kind: Deployment
metadata:
  name: routing-service
  labels:
    app: routing-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: routing-service
  template:
    metadata:
      labels:
        app: routing-service
    spec:
      serviceAccountName: routing-service
      containers:
      - name: routing-service
        image: routing-service:latest
        imagePullPolicy: Never
        envFrom:
        - configMapRef:
            name: routing-service-config
        - secretRef:
            name: postgresql-secret
        - secretRef:
            name: admin-credentials
        - secretRef:
            name: databricks-credentials
            optional: true
        env:
        - name: MODEL_DIR
          value: /models/
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        volumeMounts:
        - name: model-storage
          mountPath: /models
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: model-storage-pvc